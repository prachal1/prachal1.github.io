<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clari Updater</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --surface:   #181c27;
    --surface2:  #1e2336;
    --border:    rgba(255,255,255,0.08);
    --border2:   rgba(255,255,255,0.14);
    --accent:    #1a73e8;
    --text:      #e8eaf0;
    --muted:     #8891a8;
    --label:     #bcc3d4;
    --success:   #34a853;
    --danger:    #ea4335;
    --warning:   #fbbc04;
    --radius:    10px;
    --radius-lg: 16px;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Inter', system-ui, sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 20px;
  }

  .app {
    width: 100%;
    max-width: 680px;
  }

  /* Header */
  .header { margin-bottom: 32px; }
  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: #fff;
    flex-shrink: 0;
    letter-spacing: -0.5px;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .header-sub {
    font-size: 13px;
    color: var(--muted);
    padding-left: 44px;
  }
  .date-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-left: 44px;
    margin-top: 10px;
    font-family: var(--mono);
  }
  .date-pill span { color: var(--label); }

  /* Card */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    margin-bottom: 16px;
  }
  .section-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--label);
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 14px;
    transition: border-color 0.15s;
    outline: none;
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .divider {
    border: none;
    border-top: 0.5px solid var(--border);
    margin: 24px 0;
  }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Risk buttons */
  .risk-row { display: flex; gap: 8px; }
  .risk-btn {
    flex: 1;
    padding: 9px 0;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--surface2);
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .risk-btn:hover { filter: brightness(1.2); }
  .risk-btn.active-low    { background: #0d2b1a; border-color: var(--success); color: var(--success); }
  .risk-btn.active-medium { background: #2b2200; border-color: var(--warning); color: var(--warning); }
  .risk-btn.active-high   { background: #2b0d0d; border-color: var(--danger);  color: var(--danger);  }

  /* Output */
  .output-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 0.5px solid var(--border);
  }
  .output-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .output-body {
    padding: 20px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 2;
    color: var(--label);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .output-key { color: var(--muted); }
  .output-val { color: var(--text); }

  /* Buttons */
  .btn-group { display: flex; gap: 8px; align-items: center; }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .copy-btn:hover { opacity: 0.9; }
  .copy-btn:active { transform: scale(0.97); }
  .copy-btn.copied { background: var(--success); }

  .clear-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: transparent;
    border: 0.5px solid var(--border2);
    color: var(--muted);
    border-radius: 8px;
    padding: 7px 12px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .clear-btn:hover { color: var(--text); filter: brightness(1.2); }

  svg.icon {
    width: 13px; height: 13px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-top">
      <img src="genesys_logo.png" alt="Genesys" style="height:36px; width:36px; object-fit:contain;" />
      <h1>Clari Updater</h1>
    </div>
    <p class="header-sub">Fill in the fields below, then copy the formatted output.</p>
    <div class="date-pill">
      <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span id="date-display"></span>
    </div>
  </div>

  <div class="card">
    <p class="section-eyebrow">Activity</p>

    <div class="field">
      <label>Last Action</label>
      <textarea id="f-last" placeholder="What happened since the last update?"></textarea>
    </div>

    <div class="field">
      <label>Next Action</label>
      <textarea id="f-next" placeholder="What is the next planned step?"></textarea>
    </div>

    <hr class="divider" />
    <p class="section-eyebrow">Forecast</p>

    <div class="field">
      <label>Risk</label>
      <div class="risk-row">
        <button class="risk-btn" data-risk="Low" onclick="selectRisk(this)">Low</button>
        <button class="risk-btn" data-risk="Medium" onclick="selectRisk(this)">Medium</button>
        <button class="risk-btn" data-risk="High" onclick="selectRisk(this)">High</button>
      </div>
      <textarea id="f-risk-notes" placeholder="Risk notes (optional)..." style="min-height: 60px; margin-top: 8px;"></textarea>
    </div>

    <div class="row">
      <div class="field">
        <label>% LOC (In-Month)</label>
        <textarea id="f-locm" placeholder="e.g. 75%" style="min-height: 44px; resize: none;"></textarea>
      </div>
      <div class="field">
        <label>% LOC (In-Quarter)</label>
        <textarea id="f-locq" placeholder="e.g. 90%" style="min-height: 44px; resize: none;"></textarea>
      </div>
    </div>

    <div class="field">
      <label>Comments</label>
      <textarea id="f-comments" placeholder="Any additional context or notes?" style="min-height: 96px;"></textarea>
    </div>
  </div>

  <div class="output-card">
    <div class="output-header">
      <span class="output-title">Formatted output</span>
      <div class="btn-group">
        <button class="clear-btn" onclick="clearForm()">
          <svg class="icon" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
          Clear
        </button>
        <button class="copy-btn" id="copy-btn" onclick="copyOutput()">
          <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
      </div>
    </div>
    <div class="output-body" id="output"></div>
  </div>

</div>
<script>
  let selectedRisk = '';

  function todayStr() {
    const d = new Date();
    return String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0') + '/' + d.getFullYear();
  }

  document.getElementById('date-display').textContent = todayStr();

  function selectRisk(btn) {
    document.querySelectorAll('.risk-btn').forEach(b => b.className = 'risk-btn');
    selectedRisk = btn.dataset.risk;
    btn.classList.add('active-' + selectedRisk.toLowerCase());
    updateOutput();
  }

  function val(id) { return document.getElementById(id).value.trim(); }

  const fields = [
    { key: 'Date',               get: () => todayStr() },
    { key: 'Last Action',        get: () => val('f-last') },
    { key: 'Next Action',        get: () => val('f-next') },
    { key: 'Risk',               get: () => selectedRisk + (val('f-risk-notes') ? ' — ' + val('f-risk-notes') : '') },
    { key: '% LOC (In-Month)',   get: () => val('f-locm') },
    { key: '% LOC (In-Quarter)', get: () => val('f-locq') },
    { key: 'Comments',           get: () => val('f-comments') },
  ];

  function buildText() {
    return fields.map(f => f.key + ': ' + f.get()).join('\n');
  }

  function updateOutput() {
    document.getElementById('output').innerHTML = fields.map(f => {
      const v = f.get();
      return `<span class="output-key">${f.key}: </span><span class="output-val">${v || ''}</span>`;
    }).join('\n');
  }

  document.querySelectorAll('textarea').forEach(el => el.addEventListener('input', updateOutput));

  function copyOutput() {
    navigator.clipboard.writeText(buildText()).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.classList.add('copied');
      btn.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
      }, 2000);
    });
  }

  function clearForm() {
    document.querySelectorAll('textarea').forEach(el => el.value = '');
    selectedRisk = '';
    document.querySelectorAll('.risk-btn').forEach(b => b.className = 'risk-btn');
    updateOutput();
  }

  document.getElementById('f-risk-notes').addEventListener('input', updateOutput);

  updateOutput();
</script>
</body>
</html>
